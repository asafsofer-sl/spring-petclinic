name: JFrog Maven Build and Publish
on:
  push:
    branches: [ main ]
jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      # 1. Fetch code from GitHub
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Set up Java Environment
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Install JFrog CLI
      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: ${{ secrets.JF_URL }}

      # 3.1. Configure JFrog CLI with username + token, and set as default server
      - name: Configure JFrog CLI with username
        run: |
          jf config add ci-server --url=${{ secrets.JF_URL }} --access-token=${{ secrets.JF_ACCESS_TOKEN }} --user=asafs@jfrog.com --interactive=false
          jf config use ci-server

      # 4. Point Maven to your JFrog target repositories
      - name: Configure Maven Repositories
        run: |
          jf mvnc --server-id-resolve=ci-server --server-id-deploy=ci-server --repo-resolve-releases=maven-remote --repo-resolve-snapshots=maven-snapshots --repo-deploy-releases=maven-releases --repo-deploy-snapshots=maven-snapshots

      # 5. Compile, run tests, package, and upload artifacts to JFrog
      - name: Build and Publish Package
        run: jf mvn clean install

      # 6. Publish Build Info metadata back to the JFrog Platform
      - name: Publish Build Info
        run: |
          jf rt build-collect-env
          jf rt build-add-git
          jf rt build-publish --server-id=ci-server

      # 7. Build Docker image
      - name: Build Docker Image
        env:
          IMAGE_NAME: soltest.jfrog.io/docker-local/petclinic:${{ github.run_number }}
        run: |
          jf docker build -t $IMAGE_NAME .
          jf docker push $IMAGE_NAME --build-name=$JFROG_CLI_BUILD_NAME --build-number=$JFROG_CLI_BUILD_NUMBER
        #run: docker build -t ${{ secrets.JF_URL }}/docker-local/spring-petclinic:${{ github.sha }} .

      # 8. Login to JFrog Docker registry
      - name: Docker Login to JFrog
        run: echo ${{ secrets.JF_ACCESS_TOKEN }} | docker login ${{ secrets.JF_URL }} -u asafs@jfrog.com --password-stdin

      # 9. Push Docker image to JFrog
      - name: Push Docker Image
        run: docker push ${{ secrets.JF_URL }}/docker-local/spring-petclinic:${{ github.sha }}
