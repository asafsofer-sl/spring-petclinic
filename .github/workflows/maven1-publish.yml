name: JFrog Maven Build and Publish

on:
  push:
    branches: [ main ]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
    # 1. Fetch code from GitHub
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. Set up Java Environment
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. Install and configure JFrog CLI using your secrets
    - name: Setup JFrog CLI
      uses: jfrog/setup-jfrog-cli@v4
      env:
        JF_URL: ${{ secrets.JF_URL }}
        JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}

    # 4. Point Maven to your JFrog target repositories
    - name: Configure Maven Repositories
      run: |
        jf mvnc --repo-resolve-releases=maven-remote --repo-resolve-snapshots=maven-snapshots --repo-deploy-releases=maven-releases --repo-deploy-snapshots=maven-snapshots
    # 5. Compile, run tests, package, and upload artifacts to JFrog
    - name: Configure JFrog CLI with username
      run: jf config add ci-server --url=${{ vars.JF_URL }} --access-token=${{ secrets.JF_ACCESS_TOKEN }} --user=asafs@jfrog.com --interactive=false
    - name: Build and Publish Package
      run: jf mvn clean install

    # 6. Publish Build Info metadata back to the JFrog Platform
    - name: Publish Build Info
      run: |
        jf rt build-collect-env
        jf rt build-add-git
        jf rt build-publish

